name: Build windows-monitor

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "1.0.${{ github.run_number }}"
          }
          "WINDOWS_MONITOR_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Resolved version: $version"

      - name: Build release artifacts
        shell: pwsh
        run: .\build.ps1

      - name: Upload app package
        uses: actions/upload-artifact@v4
        with:
          name: windows-monitor
          path: release/windows-monitor.zip

      - name: Upload setup package
        uses: actions/upload-artifact@v4
        with:
          name: windows-monitor-setup
          path: release/windows-monitor-setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows-monitor.zip
            release/windows-monitor-setup.exe
          generate_release_notes: true
